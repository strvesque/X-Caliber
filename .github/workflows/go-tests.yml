name: Go Tests and Build

on:
  push:
    branches: [ 'automation-extension' ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22.x'

      - name: Run tests
        run: |
          go test ./... -v

      - name: Build xcal-subdomain
        run: |
          go build -o xcal-subdomain ./recon_go/subdomain

      - name: Build xcal-portscan
        run: |
          go build -o xcal-portscan ./recon_go/portscan

      - name: Build xcal-httpprobe
        run: |
          go build -o xcal-httpprobe ./recon_go/httpprobe
